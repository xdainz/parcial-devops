services:
    frontend:
        build: ./frontend/.
        env_file:
            - ./frontend/.env.example
        ports:
            - "80:80"

    bd:
        build: ./bd/.
        restart: always
        env_file:
            - ./bd/.env.example

        ports:
            - "3306:3306"
        volumes:
            - db_vol:/var/lib/mysql

    backend:
        build: ./backend/.
networks:
    innovatech_network:

volumes:
    db_vol:
