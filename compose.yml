services:
    frontend:
        build: ./frontend/.
        env_file:
            - ./frontend/.env.example
        ports:
            - "80:80"

    bd:
        build: ./bd/.
        restart: always
        env_file:
            - ./bd/.env.example

        ports:
            - "3306:3306"
        volumes:
            - db_vol:/var/lib/mysql

    backend:
        build: ./backend/.
        restart: unless-stopped
        env_file:
            - ./backend/.env.example
        environment:
            DB_HOST: bd
            CORS_ORIGIN: http://localhost
        ports:
            - "3001:3001"

networks:
    innovatech_network:

volumes:
    db_vol:
