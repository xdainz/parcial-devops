name: Backend Deploy

on:
  push:
    branches:
      - deploy
    paths:
      - "backend/**"
      - "aws/taskdef-backend.json"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  ECS_CLUSTER: innovatech-cluster
  ECS_SERVICE: backend-service
  TASK_FAMILY: task-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t backend ./backend
          docker tag backend:latest ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

      - name: Push image to ECR
        run: |
          docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

      - name: Render ECS task definition
        env:
          ECR_REPO_URL_BACKEND: ${{ secrets.ECR_REPO_URL_BACKEND }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DB_HOST: ${{ secrets.RDS_IP }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CORS_ORIGIN: ${{ secrets.FRONTEND_IP }}
        run: |
          export LAB_ROLE_ARN="arn:aws:iam::$(aws sts get-caller-identity --query Account --output text):role/LabRole"
          envsubst '$ECR_REPO_URL_BACKEND $AWS_REGION $DB_HOST $DB_NAME $DB_USER $DB_PASSWORD $CORS_ORIGIN $LAB_ROLE_ARN' \
            < aws/taskdef-backend.json > taskdef.json

      - name: Register task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://taskdef.json \
            --query 'taskDefinition.{family:family,revision:revision}'

      - name: Deploy to ECS
        run: |
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $ECS_SERVICE \
              --task-definition $TASK_FAMILY \
              --force-new-deployment \
              --query 'service.{service:serviceName,taskDefinition:taskDefinition}'
            echo "Waiting for service to stabilize..."
            aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE
          else
            echo "Service $ECS_SERVICE does not exist yet."
            echo "Image was pushed and task definition registered."
            echo "Create the service following AWS_SETUP.md, then this step will deploy on the next run."
          fi
