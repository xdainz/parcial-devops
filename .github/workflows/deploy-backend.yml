name: Backend Deploy

on:
  push:
    branches:
      - deploy
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pass env to NGINX
        env:
          NGINX_BACKEND_IP: ${ secrets.BACKEND_IP}
        run: |
          envsubst '$NGINX_BACKEND_IP' < ./backend/nginx.conf > ./backend/nginx.conf

      - name: Build Docker image
        run: |
          docker build -t backend ./backend
          docker tag backend:latest ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

      - name: Push image to ECR
        run: |
          docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

      - name: Create SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Deploy to private backend EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i key.pem \
          ec2-user@${{ secrets.EC2_FRONTEND_PUBLIC_IP }} \
          "ssh -o StrictHostKeyChecking=no \
          -i ~/DevOps.pem \
          ec2-user@${{ secrets.EC2_BACKEND_PRIVATE_IP }} \
          'aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 089485767547.dkr.ecr.us-east-1.amazonaws.com && \
          docker pull ${{ secrets.ECR_REPO_URL_BACKEND }}:latest && \
          docker rm -f backend || true && \
          docker run -d -p 3001:3001 \
          -e PORT=3001 \
          -e DB_HOST=${ secrets.RDS_IP } \
          -e DB_PORT=3306 \
          -e DB_NAME=${ secrets.DB_NAME } \
          -e DB_USER=${ secrets.DB_USER } \
          -e DB_PASSWORD=${ secrets.DB_PASSWORD } \
          -e CORS_ORIGIN=${ secrets.FRONTEND_IP }  \
          --restart unless-stopped \
          --name backend \
          ${{ secrets.ECR_REPO_URL_BACKEND }}:latest'"
